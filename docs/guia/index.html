<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ruxi</title>
<style>
  :root {
    --bg:#070810; --txt:#eef0f7; --dim:#9aa0b6; --faint:#666c84;
    --glass:rgba(255,255,255,.045); --glass-hi:rgba(255,255,255,.085); --stroke:rgba(255,255,255,.10);
    --grad:linear-gradient(105deg,#2f7bff 0%,#7b5cff 48%,#e23aff 100%);
    --mid:#7b5cff; --green:#54e6a6;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI','Microsoft YaHei',system-ui,sans-serif; background:radial-gradient(120% 80% at 20% 0%,#11132a,#070810 60%); color:var(--txt); min-height:100vh; padding:18px; line-height:1.5; }
  .wrap { max-width:640px; margin:0 auto; }
  header { text-align:center; padding:14px 0 18px; }
  header h1 { font-size:22px; background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  header p { font-size:13px; color:var(--dim); margin-top:4px; }
  .lang-bar { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:14px; }
  .lang-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border-radius:999px; background:var(--glass); border:1.5px solid var(--stroke); color:var(--dim); font:inherit; font-size:12px; font-weight:600; cursor:pointer; }
  .lang-pill.sel { background:var(--grad); color:#fff; border-color:transparent; }
  .lang-pill .flag { width:18px; height:12px; border-radius:2px; display:block; }
  .cfg { display:flex; flex-direction:column; gap:12px; background:var(--glass); border:1px solid var(--stroke); border-radius:14px; padding:14px; margin:14px 0; }
  .cfg-group { display:flex; flex-direction:column; gap:7px; }
  .cfg-label { font-size:12px; font-weight:600; color:var(--dim); }
  .chips { display:flex; gap:8px; }
  .chip { flex:1; text-align:center; padding:10px 12px; border-radius:10px; background:var(--glass); border:1.5px solid var(--stroke); color:var(--dim); font-size:12.5px; font-weight:600; cursor:pointer; }
  .chip.sel { background:var(--grad); color:#fff; border-color:transparent; }
  .boot-banner { background:rgba(47,123,255,.1); border:1px solid rgba(47,123,255,.3); border-radius:10px; padding:9px 12px; font-size:12.5px; margin-bottom:8px; }
  h2 { font-size:15px; margin:22px 0 10px; display:flex; align-items:center; gap:8px; }
  table { border-collapse:collapse; width:100%; font-size:12.5px; border-radius:10px; overflow:hidden; border:1px solid var(--stroke); }
  th,td { padding:8px 10px; text-align:left; border-bottom:1px solid var(--stroke); }
  th { background:rgba(123,92,255,.15); font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
  tr.hl td { background:rgba(123,92,255,.22); font-weight:700; }
  ol { list-style:none; display:flex; flex-direction:column; gap:8px; }
  li { background:var(--glass); border:1px solid var(--stroke); border-radius:12px; padding:12px 14px; }
  li.crit { border-color:rgba(255,170,0,.35); background:rgba(255,170,0,.06); }
  li strong { font-size:13.5px; }
  li .d { font-size:12.5px; color:var(--dim); margin-top:4px; }
  li .tip { background:rgba(123,92,255,.1); border-radius:8px; padding:7px 10px; margin-top:8px; font-size:11.5px; color:var(--dim); }
  a.btn { display:inline-block; margin-top:8px; background:var(--grad); color:#fff; text-decoration:none; padding:9px 16px; border-radius:11px; font-size:12.5px; font-weight:700; }
  footer { text-align:center; color:var(--faint); font-size:11px; margin:26px 0 10px; }
  details.acc { background:var(--glass); border:1px solid var(--stroke); border-radius:12px; margin-top:8px; overflow:hidden; }
  details.acc summary { cursor:pointer; list-style:none; padding:11px 14px; font-size:12.5px; font-weight:600; color:var(--txt); }
  details.acc summary::-webkit-details-marker { display:none; }
  details.acc[open] summary { border-bottom:1px solid var(--stroke); }
  details.acc .acc-body { padding:12px 14px; font-size:12.5px; color:var(--dim); line-height:1.6; }
  details.acc .acc-body code { font-family:ui-monospace,'Consolas',monospace; font-size:11.5px; background:rgba(47,123,255,.14); color:#8bbeff; padding:2px 6px; border-radius:6px; }
  details.acc .acc-body ol { list-style:decimal; padding-left:20px; display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  details.acc .acc-body ol li { background:none; border:none; border-radius:0; padding:0; }
  li details.acc { margin-top:8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 data-i18n="pdf.docTitle"></h1>
    <div class="lang-bar" id="lang-bar"></div>
  </header>

  <div class="cfg">
    <div class="cfg-group">
      <span class="cfg-label" data-i18n="cfg.device"></span>
      <div class="chips">
        <span class="chip" data-k="equipo" data-v="desktop" data-i18n="chip.desktop"></span>
        <span class="chip" data-k="equipo" data-v="laptop" data-i18n="chip.laptop"></span>
      </div>
    </div>
    <div class="cfg-group">
      <span class="cfg-label" data-i18n="cfg.scenario"></span>
      <div class="chips">
        <span class="chip" data-k="caso" data-v="new" data-i18n="chip.new"></span>
        <span class="chip" data-k="caso" data-v="reinstall" data-i18n="chip.reinstall"></span>
      </div>
    </div>
    <div class="cfg-group">
      <span class="cfg-label" data-i18n="cfg.backup"></span>
      <div class="chips">
        <span class="chip" data-k="backup" data-v="no" data-i18n="chip.bkNo"></span>
        <span class="chip" data-k="backup" data-v="yes" data-i18n="chip.bkYes"></span>
      </div>
    </div>
  </div>

  <h2 data-i18n="mg.bootHead"></h2>
  <div class="boot-banner" id="boot-banner" style="display:none"></div>
  <p style="font-size:12.5px;color:var(--dim);margin-bottom:8px" data-i18n="pdf.bootIntro"></p>
  <table id="boot"></table>
  <div id="boot-details"></div>

  <h2 data-i18n="sec.during"></h2>
  <ol id="install"></ol>

  <h2 data-i18n="sec.after"></h2>
  <ol id="post"></ol>

  <footer>github.com/PoxiiTV/Ruxi-Custom-Rufus</footer>
</div>

<script src="i18n/core.js"></script>
<script src="i18n/lang/es.js"></script>
<script src="i18n/lang/en.js"></script>
<script src="i18n/lang/fr.js"></script>
<script src="i18n/lang/pt.js"></script>
<script src="i18n/lang/de.js"></script>
<script src="i18n/lang/ru.js"></script>
<script src="i18n/lang/zh.js"></script>
<script src="i18n/guide-builder.js"></script>
<script>
const params = new URLSearchParams(location.search);
const state = {
  equipo: params.get('equipo') === 'laptop' ? 'laptop' : 'desktop',
  caso: params.get('caso') === 'reinstall' ? 'reinstall' : 'new',
  backup: params.get('backup') === 'yes' ? 'yes' : 'no',
  marca: (params.get('marca') || '').toLowerCase(),
};
// Idioma: de la URL (?idioma=), si no el guardado, si no ES. setLang valida contra LANGS.
setLang(params.get('idioma') || getLang());

const BOOT = [
  ['ASUS / ROG','Del / F2','F8','asus'],['MSI','Del','F11','msi'],['Gigabyte','Del / F2','F12','gigabyte'],
  ['HP','F10 / Esc','F9','hp'],['Lenovo','F2 / Fn+F2','F12','lenovo'],['Dell','F2','F12','dell'],['Acer','F2 / Del','F12','acer'],
];
const BRAND_NAMES = { asus:'ASUS', msi:'MSI', gigabyte:'Gigabyte', hp:'HP', lenovo:'Lenovo', dell:'Dell', acer:'Acer' };

function renderLangBar() {
  const cur = getLang();
  document.getElementById('lang-bar').innerHTML = window.LANGS.map(l =>
    `<button class="lang-pill ${l.code === cur ? 'sel' : ''}" data-lang="${l.code}">${l.flag}<span>${l.name}</span></button>`
  ).join('');
}

function bootDetails() {
  const order = `<ol><li>${t('s9.order.1')}</li><li>${t('s9.order.2')}</li><li>${t('s9.order.3')}</li></ol>${t('s9.order.tip')}`;
  const sb = `${t('sb.what')}<br><br>${t('sb.intro')}<ol><li>${t('sb.1')}</li><li>${t('sb.2')}</li><li>${t('sb.3')}</li><li>${t('sb.4')}</li><li>${t('sb.5')}</li></ol>${t('sb.reenable')}`;
  const det = [
    [t('s7.biosVsBoot.q'), t('s7.biosVsBoot.a')],
    [t('s7.noEnter.q'), t('s7.noEnter.a')],
    [t('s9.order.title'), order],
    [t('sb.toggle'), sb],
  ];
  return det.map(d => `<details class="acc"><summary>${d[0]}</summary><div class="acc-body">${d[1]}</div></details>`).join('');
}

function render() {
  document.documentElement.lang = getLang();
  document.title = t('pdf.docTitle').replace(/<[^>]+>/g, '');
  applyI18n();

  // Chips seleccionados
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('sel', state[c.dataset.k] === c.dataset.v));

  // Tabla de teclas de arranque
  document.getElementById('boot').innerHTML =
    `<tr><th>${t('boot.brand')}</th><th>${t('boot.bios')}</th><th>${t('boot.boot')}</th></tr>` +
    BOOT.map(r => `<tr class="${r[3] === state.marca ? 'hl' : ''}"><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('');

  // Banner de marca detectada
  const banner = document.getElementById('boot-banner');
  const row = BOOT.find(r => r[3] === state.marca);
  if (row) {
    banner.innerHTML = t('pc.detect', { brand: BRAND_NAMES[state.marca], extra: '', key: row[2] });
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }

  // Desplegables de arranque (BIOS vs Boot, no entro, orden, Secure Boot)
  document.getElementById('boot-details').innerHTML = bootDetails();

  // Pasos (constructor compartido)
  let n = 0;
  const li = s => `<li class="${s.crit ? 'crit' : ''}"><strong>${++n}. ${s.t}</strong><div class="d">${s.d}</div>${s.action ? `<a class="btn" href="${s.action.url}" target="_blank" rel="noopener">${s.action.label}</a>` : ''}${s.why ? `<details class="acc"><summary>${t('why.label')}</summary><div class="acc-body">${s.why}</div></details>` : ''}${s.tip ? `<div class="tip">${s.tip}</div>` : ''}</li>`;
  const install = window.GUIDE_BUILD.install({ laptop: state.equipo === 'laptop', reinstall: state.caso === 'reinstall', backup: state.backup === 'yes' });
  const post = window.GUIDE_BUILD.post({ laptop: state.equipo === 'laptop', backup: state.backup === 'yes' });
  document.getElementById('install').innerHTML = install.map(li).join('');
  document.getElementById('post').innerHTML = post.map(li).join('');

  renderLangBar();
}

// Delegación: chips de configuración + selector de idioma
document.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (chip) { state[chip.dataset.k] = chip.dataset.v; render(); return; }
  const pill = e.target.closest('.lang-pill');
  if (pill) { setLang(pill.dataset.lang); render(); return; }
});

render();
</script>
</body>
</html>
